# HTTP -> redirect to HTTPS
server {
    listen 80;
    server_name panozosistemas.com.ar www.panozosistemas.com.ar;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name panozosistemas.com.ar www.panozosistemas.com.ar;

    ssl_certificate /etc/letsencrypt/live/panozosistemas.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panozosistemas.com.ar/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' data: https:; connect-src 'self' https:;";
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Archivos públicos (marketing, catálogos)
    location /media/public/ {
        alias /media/public/;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
    }

    # Archivos privados servidos vía X-Accel-Redirect desde Django
    location /media/private/ {
        internal;
        alias /media/private/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
    }
}
