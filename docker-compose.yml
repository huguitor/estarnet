services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estarnet}
      POSTGRES_USER: ${POSTGRES_USER:-estarnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estarnet}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8000'
    volumes:
      - media_storage:/media
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_storage:/media:ro
    restart: unless-stopped

volumes:
  db_data:
  media_storage:
